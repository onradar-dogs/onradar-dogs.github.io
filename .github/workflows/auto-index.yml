name: Auto-Index to Google
on:
  schedule:
    - cron: '15 8 * * *'
  workflow_dispatch: {}
jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install google-auth google-auth-oauthlib google-auth-httplib2 requests
      - run: mkdir -p credentials
      - run: echo '${{ secrets.GOOGLE_INDEXING_KEY }}' > credentials/google-indexing-key.json
      - run: python3 scripts/auto_index.py
