name: Auto-Index to Google

on:
  schedule:
    - cron: '15 8 * * *'
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 requests

      - name: Save credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_INDEXING_KEY }}' > credentials/google-indexing-key.json

      - name: Run auto-indexing
        run: |
          python3 << 'EOF'
          import json
          import sys
          from pathlib import Path
          from datetime import datetime
          import requests
          from google.auth.transport.requests import Request
          from google.oauth2.service_account import Credentials

          SITE_DOMAIN = "https://onradar-dogs.github.io"
          SITEMAP_URL = f"{SITE_DOMAIN}/sitemap.xml"
          SERVICE_ACCOUNT_KEY_PATH = Path("credentials/google-indexing-key.json")

          SCOPES = ["https://www.googleapis.com/auth/indexing"]
          INDEXING_API_URL = "https://indexing.googleapis.com/v3/urlNotifications:publish"

          def get_auth_token():
              if not SERVICE_ACCOUNT_KEY_PATH.exists():
                  print(f"Service Account key not found")
                  sys.exit(1)
              credentials = Credentials.from_service_account_file(
                  SERVICE_ACCOUNT_KEY_PATH, scopes=SCOPES
              )
              credentials.refresh(Request())
              return credentials.token

          def parse_sitemap(sitemap_url):
              try:
                  response = requests.get(sitemap_url, timeout=10)
                  response.raise_for_status()
                  import xml.etree.ElementTree as ET
                  root = ET.fromstring(response.content)
                  ns = {"ns": "http://www.sitemaps.org/schemas/sitemap/0.9"}
                  urls = [loc.text for loc in root.findall(".//ns:loc", ns)]
                  return urls
              except Exception as e:
                  print(f"Error parsing sitemap: {e}")
                  return []

          def submit_url_to_index(url, token):
              headers = {
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              }
              body = {
                  "url": url,
                  "type": "URL_UPDATED",
              }
              try:
                  response = requests.post(
                      INDEXING_API_URL,
                      json=body,
                      headers=headers,
                      timeout=10,
                  )
                  return response.status_code in [200, 204], response.text
              except Exception as e:
                  return False, str(e)

          print(f"Starting auto-indexing for {SITE_DOMAIN}")
          print(f"{datetime.now().isoformat()}\n")

          print("Getting authentication token...")
          try:
              token = get_auth_token()
              print("Auth token acquired\n")
          except Exception as e:
              print(f"Auth failed: {e}")
              sys.exit(1)

          print(f"Fetching sitemap...")
          urls = parse_sitemap(SITEMAP_URL)

          if not urls:
              print("No URLs found in sitemap")
              sys.exit(1)

          print(f"Found {len(urls)} URLs\n")

          print("Submitting URLs to Google...")
          successful = 0
          failed = 0

          for url in urls:
              success, message = submit_url_to_index(url, token)
              if success:
                  print(f"OK: {url}")
                  successful += 1
              else:
                  print(f"FAIL: {url}")
                  failed += 1

          print(f"\n{'='*60}")
          print(f"Summary: {successful} successful, {failed} failed")
          print(f"{datetime.now().isoformat()}")

          sys.exit(0 if failed == 0 else 1)
          EOF
