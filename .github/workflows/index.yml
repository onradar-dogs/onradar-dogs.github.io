name: Index URLs
on:
  schedule:
    - cron: '15 8 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: apt-get update && apt-get install -y python3-pip
      - run: pip install google-auth google-auth-oauthlib google-auth-httplib2 requests
      - run: mkdir -p /tmp/creds && echo "$CREDS" > /tmp/creds/key.json
        env:
          CREDS: ${{ secrets.GOOGLE_INDEXING_KEY }}
      - run: |
          python3 <<'PYEOF'
          import requests
          from google.auth.transport.requests import Request
          from google.oauth2.service_account import Credentials
          creds = Credentials.from_service_account_file('/tmp/creds/key.json', scopes=['https://www.googleapis.com/auth/indexing'])
          creds.refresh(Request())
          r = requests.get('https://onradar-dogs.github.io/sitemap.xml').text
          import xml.etree.ElementTree as ET
          urls = [x.text for x in ET.fromstring(r).findall('.//{http://www.sitemaps.org/schemas/sitemap/0.9}loc')]
          for url in urls:
            resp = requests.post('https://indexing.googleapis.com/v3/urlNotifications:publish', json={'url': url, 'type': 'URL_UPDATED'}, headers={'Authorization': f'Bearer {creds.token}', 'Content-Type': 'application/json'})
            print(f'{url}: {resp.status_code}')
          PYEOF
